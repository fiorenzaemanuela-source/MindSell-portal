name: Deploy notturno (2:00)

on:
  schedule:
    - cron: '0 1 * * *'  # ogni notte all'1:00 UTC = 2:00 ora italiana (CET)
  workflow_dispatch:       # permette anche di avviarlo manualmente dal sito GitHub

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configura git
        run: |
          git config user.name "AutoDeploy MindSell"
          git config user.email "deploy@mindsell.it"

      - name: Mergia dev in main
        run: |
          git checkout main
          git merge origin/dev --no-ff -m "🚀 Deploy automatico notturno $(date +'%d/%m/%Y %H:%M')"
          git push origin main

      - name: Notifica su successo
        if: success()
        run: echo "✅ Deploy completato alle $(date +'%H:%M %d/%m/%Y')"

      - name: Notifica su errore
        if: failure()
        run: echo "❌ Deploy fallito - controlla i conflitti tra dev e main"
